name: 发布

# 推送形如 v1.2.3 的 tag 时触发：在 Windows 上打包 Electron 应用并创建 GitHub Release。
# 源码（软件源码/package.json）就绪后自动生效；未就绪时仅创建空 Release 占位并提示。

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: 打包 Windows 安装包
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 软件源码
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检测源码是否就绪
        id: detect
        shell: bash
        run: |
          if [ -f "软件源码/package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::软件源码/package.json 不存在，跳过打包，仅创建 Release 占位。"
          fi
        working-directory: .

      - name: 安装 Node.js
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 软件源码/package-lock.json

      - name: 安装依赖
        if: steps.detect.outputs.ready == 'true'
        run: npm ci

      - name: 打包（electron-builder）
        if: steps.detect.outputs.ready == 'true'
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: |
            软件源码/dist/*.exe
            软件源码/dist/*.exe.blockmap
            软件源码/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
