name: 功能需求
description: 提出一个新功能或改进
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么痛点?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望如何实现?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: 涉及模块
      options:
        - browser (浏览器控制)
        - sms (接码)
        - email (邮箱监听)
        - captcha (打码)
        - store (存储)
        - callback (回调)
        - codex (Codex-Manager 集成)
        - cpa (CPA 平台)
        - scheduler (调度)
        - log / config / ui / 其他
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 补充说明
